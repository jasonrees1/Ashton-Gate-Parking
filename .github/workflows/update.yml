name: Update Bristol Bears Calendar

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (scrape only, do not commit)"
        required: false
        default: "false"
        type: boolean
  push:
    branches:
      - main
    paths:
      - "core.py"
      - "scraper.py"
      - "ics_generator.py"
      - "main.py"
      - "config.json"
      - "requirements.txt"

jobs:
  update-calendar:
    name: Scrape & Update Calendar
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write
      issues: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create output directories
        run: |
          mkdir -p calendar
          mkdir -p logs
          mkdir -p diagnostics

      - name: Run calendar scraper
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python main.py --dry-run
          else
            python main.py --verify
          fi

      - name: Validate ICS file
        if: github.event.inputs.dry_run != 'true'
        run: |
          python -c "
          from pathlib import Path
          import re
          ics = Path('calendar/bristol_bears_and_ashton_gate.ics').read_text(encoding='utf-8')
          assert 'BEGIN:VCALENDAR' in ics
          assert 'END:VCALENDAR' in ics
          n = ics.count('BEGIN:VEVENT')
          if n == 0:
              raise ValueError('ICS file contains no events!')
          print(f'ICS validation passed: {n} events, {Path(\"calendar/bristol_bears_and_ashton_gate.ics\").stat().st_size} bytes')
          "

      - name: Show calendar summary
        if: github.event.inputs.dry_run != 'true'
        run: |
          python -c "
          from pathlib import Path
          import re
          ics = Path('calendar/bristol_bears_and_ashton_gate.ics').read_text(encoding='utf-8')
          events = []
          for block in ics.split('BEGIN:VEVENT')[1:]:
              summary = re.search(r'^SUMMARY:(.+)$', block, re.MULTILINE)
              dtstart = re.search(r'^DTSTART[^:]*:(\d{8}T\d{6})', block, re.MULTILINE)
              if summary and dtstart:
                  dt = dtstart.group(1)
                  dt_fmt = f'{dt[0:4]}-{dt[4:6]}-{dt[6:8]} {dt[9:11]}:{dt[11:13]}'
                  events.append((dt_fmt, summary.group(1).strip()))
          events.sort()
          print(f'=== Calendar: {len(events)} events ===')
          for dt, title in events:
              print(f'  {dt}  |  {title}')
          "

      - name: Show diagnostic summary
        if: always()
        run: |
          if [ -f diagnostics/last_run.json ]; then
            echo "=== Scraper diagnostics ==="
            cat diagnostics/last_run.json
          else
            echo "No diagnostic file found"
          fi

      - name: Commit and push updated files
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git fetch origin main
          git reset --soft origin/main

          git add calendar/bristol_bears_and_ashton_gate.ics
          [ -f diagnostics/last_run.json ] && git add diagnostics/last_run.json

          if git diff --staged --quiet; then
            echo "No changes to commit — calendar is up to date."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            EVENT_COUNT=$(python -c "
          from pathlib import Path
          ics = Path('calendar/bristol_bears_and_ashton_gate.ics').read_text()
          print(ics.count('BEGIN:VEVENT'))
            ")
            git commit -m "chore: update calendar [$TIMESTAMP] - ${EVENT_COUNT} events"
            git push origin main
            echo "Calendar pushed successfully."
          fi

      - name: Upload diagnostics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics
          path: diagnostics/last_run.json
          retention-days: 30

      - name: Upload ICS as workflow artifact
        if: always() && github.event.inputs.dry_run != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: bristol-bears-calendar-${{ github.run_number }}
          path: calendar/bristol_bears_and_ashton_gate.ics
          retention-days: 30

      - name: Create GitHub Issue on failure
        if: failure() && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DIAG=$(cat diagnostics/last_run.json 2>/dev/null || echo '{"status":"unknown","error":"diagnostic file not written before failure"}')

          # Ensure the label exists
          gh label create "scraper-failure" \
            --color "d73a4a" \
            --description "Automated scraper failure alert" 2>/dev/null || true

          # If an open issue already exists for this label, add a comment instead
          EXISTING=$(gh issue list --label "scraper-failure" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")

          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")

          if [ -n "$EXISTING" ]; then
            echo "Open issue #$EXISTING exists — adding comment"
            gh issue comment "$EXISTING" --body "$(cat <<EOF
          **Scraper failed again at $TIMESTAMP**

          [View run]($RUN_URL)

          \`\`\`json
          $DIAG
          \`\`\`
          EOF
          )"
          else
            gh issue create \
              --title "Scraper degraded — $TIMESTAMP" \
              --label "scraper-failure" \
              --body "$(cat <<EOF
          ## Calendar scraper failure

          The daily scraper failed on the scheduled run.

          **Run:** [${{ github.run_id }}]($RUN_URL)
          **Time:** $TIMESTAMP

          ## Diagnostics

          \`\`\`json
          $DIAG
          \`\`\`

          ## What to check

          - [ ] BBC Sport JSON API — URL or response structure changed? Check \`BBC_API_URL\` in \`scraper.py\`
          - [ ] Bristol Bears website — HTML structure changed? Check \`scrape_bears()\`
          - [ ] Ashton Gate website — HTML structure changed? Check \`scrape_ashton_gate()\`
          - [ ] Hardcoded fixture lists expired? Update \`KNOWN_BEARS_FIXTURES\`, \`KNOWN_AG_EVENTS\`, \`KNOWN_BCFC_FIXTURES\` in \`scraper.py\`

          Close this issue once fixed and the next scheduled run passes.
          EOF
          )"
          fi
