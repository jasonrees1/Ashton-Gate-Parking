name: Update Bristol Bears Calendar

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (scrape only, do not commit)"
        required: false
        default: "false"
        type: boolean
  push:
    branches:
      - main
    paths:
      - "scraper.py"
      - "scraper_bcfc.py"
      - "ics_generator.py"
      - "main.py"
      - "config.json"
      - "requirements.txt"

jobs:
  update-calendar:
    name: Scrape & Update Calendar
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create output directories
        run: |
          mkdir -p calendar
          mkdir -p logs

      - name: Run calendar scraper
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python main.py --dry-run
          else
            python main.py --verify
          fi

      - name: Validate ICS file
        if: github.event.inputs.dry_run != 'true'
        run: |
          python -c "
          from pathlib import Path
          import re
          ics = Path('calendar/bristol_bears_and_ashton_gate.ics').read_text(encoding='utf-8')
          assert 'BEGIN:VCALENDAR' in ics
          assert 'END:VCALENDAR' in ics
          n = ics.count('BEGIN:VEVENT')
          if n == 0:
              raise ValueError('ICS file contains no events!')
          print(f'ICS validation passed: {n} events, {Path(\"calendar/bristol_bears_and_ashton_gate.ics\").stat().st_size} bytes')
          "

      - name: Show calendar summary
        if: github.event.inputs.dry_run != 'true'
        run: |
          python -c "
          from pathlib import Path
          import re
          ics = Path('calendar/bristol_bears_and_ashton_gate.ics').read_text(encoding='utf-8')
          events = []
          for block in ics.split('BEGIN:VEVENT')[1:]:
              summary = re.search(r'^SUMMARY:(.+)$', block, re.MULTILINE)
              dtstart = re.search(r'^DTSTART[^:]*:(\d{8}T\d{6})', block, re.MULTILINE)
              if summary and dtstart:
                  dt = dtstart.group(1)
                  dt_fmt = f'{dt[0:4]}-{dt[4:6]}-{dt[6:8]} {dt[9:11]}:{dt[11:13]}'
                  events.append((dt_fmt, summary.group(1).strip()))
          events.sort()
          print(f'=== Calendar: {len(events)} events ===')
          for dt, title in events:
              print(f'  {dt}  |  {title}')
          "

      - name: Commit and push updated calendar
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Always fetch latest before doing anything
          git fetch origin main

          # Reset to origin/main to avoid any conflict
          git reset --soft origin/main

          # Stage only the calendar file
          git add calendar/bristol_bears_and_ashton_gate.ics

          if git diff --staged --quiet; then
            echo "No changes to commit — calendar is up to date."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            EVENT_COUNT=$(python -c "
          from pathlib import Path
          ics = Path('calendar/bristol_bears_and_ashton_gate.ics').read_text()
          print(ics.count('BEGIN:VEVENT'))
            ")
            git commit -m "chore: update calendar [$TIMESTAMP] - ${EVENT_COUNT} events"
            git push origin main
            echo "Calendar pushed successfully."
          fi

      - name: Upload ICS as workflow artifact
        if: always() && github.event.inputs.dry_run != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: bristol-bears-calendar-${{ github.run_number }}
          path: calendar/bristol_bears_and_ashton_gate.ics
          retention-days: 30

      - name: Handle failure
        if: failure()
        run: |
          echo "::error::Calendar update failed! Check the logs above."
          echo "The existing calendar file has NOT been modified."
          exit 1
